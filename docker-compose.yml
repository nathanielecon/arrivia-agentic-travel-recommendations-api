services:
  api:
    image: ${ARRIVIA_RECS_IMAGE:-arrivia-recs:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./.data:/app/.data
    ports:
      - "8080:8080"
    networks:
      - app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  member-service:
    image: wiremock/wiremock:3.6.0@sha256:1cf76043f9052c32d13fb06b562e3328e284fc46cf04c756595201f5de7d3c75
    command: ["--port", "8081", "--disable-banner", "--verbose"]
    volumes:
      - ./mocks/member-service:/home/wiremock
    networks:
      - app
    profiles:
      - mocks
    restart: unless-stopped

  partner-config-service:
    image: wiremock/wiremock:3.6.0@sha256:1cf76043f9052c32d13fb06b562e3328e284fc46cf04c756595201f5de7d3c75
    command: ["--port", "8082", "--disable-banner", "--verbose"]
    volumes:
      - ./mocks/partner-config-service:/home/wiremock
    ports:
      - "127.0.0.1:${PARTNER_CONFIG_ADMIN_PORT:-8082}:8082"
    networks:
      - app
    profiles:
      - mocks
    restart: unless-stopped

networks:
  app:
    driver: bridge
